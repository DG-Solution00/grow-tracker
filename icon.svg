<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="110" fill="#0a0f0d"/>
  <circle cx="256" cy="256" r="180" fill="none" stroke="#1a3a1f" stroke-width="2"/>
  <!-- Glow -->
  <radialGradient id="glow" cx="50%" cy="40%" r="50%">
    <stop offset="0%" stop-color="#56ab2f" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="#0a0f0d" stop-opacity="0"/>
  </radialGradient>
  <circle cx="256" cy="210" r="160" fill="url(#glow)"/>
  <!-- Stars -->
  <circle cx="160" cy="140" r="3" fill="#a8e063" opacity="0.8"/>
  <circle cx="340" cy="120" r="2" fill="#a8e063" opacity="0.5"/>
  <circle cx="380" cy="200" r="2.5" fill="#a8e063" opacity="0.6"/>
  <circle cx="130" cy="220" r="2" fill="#a8e063" opacity="0.4"/>
  <circle cx="360" cy="320" r="2" fill="#a8e063" opacity="0.5"/>
  <!-- Main stem -->
  <line x1="256" y1="380" x2="256" y2="200" stroke="#56ab2f" stroke-width="6" stroke-linecap="round"/>
  <!-- Left leaf -->
  <path d="M256 280 Q200 240 180 190 Q220 200 256 280Z" fill="#56ab2f" opacity="0.9"/>
  <!-- Right leaf -->
  <path d="M256 260 Q310 220 330 170 Q295 185 256 260Z" fill="#a8e063" opacity="0.9"/>
