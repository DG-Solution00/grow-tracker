  <circle cx="248" cy="158" r="2.5" fill="white" opacity="0.7"/>
  <circle cx="264" cy="161" r="2" fill="white" opacity="0.6"/>
  <circle cx="255" cy="168" r="2" fill="white" opacity="0.5"/>
  <circle cx="244" cy="168" r="1.5" fill="white" opacity="0.4"/>
  <!-- Bottom pot line -->
  <path d="M210 390 Q256 400 302 390" stroke="#1a3a1f" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- App name -->
  <text x="256" y="450" text-anchor="middle" font-family="Georgia, serif" font-size="28" font-weight="700" fill="#a8e063" letter-spacing="2">GROW</text>
